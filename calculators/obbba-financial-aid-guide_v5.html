<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBBBA Financial Aid Updates – Stockton University</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="../css/stockton-theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             var(--bg-color);
      --surface:        var(--card-bg);
      --surface-2:      var(--bg-color);
      --surface-3:      var(--border-color);
      --accent:         var(--stockton-blue);
      --accent-glow:    rgba(0, 105, 170, 0.15);
      --accent-dim:     var(--stockton-blue-light);
      --text:           var(--text-primary);
      --text-muted:     var(--text-muted);
      --text-dim:       #aaaaaa;
      --border:         var(--border-color);
      --border-strong:  var(--stockton-blue);
      --success:        var(--color-success);
      --warning:        var(--color-warning);
      --danger:         var(--color-error);
      --font:           var(--font-sans);
      --mono:           var(--font-mono);
      --hdr:            64px;
      --tnav:           50px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── Disclaimer ── */
    .disclaimer {
      background: rgba(245,183,49,0.07);
      border-bottom: 1px solid rgba(245,183,49,0.18);
      padding: 9px 1.5rem;
      text-align: center;
      font-size: 12px;
      color: var(--warning);
    }
    .disclaimer a { color: var(--warning); text-decoration: underline; }

    /* ── Header ── */
    .hdr {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: var(--hdr);
      padding: 0 2rem;
    }
    .hdr-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hdr-brand { display: flex; align-items: center; gap: 11px; }
    .hdr-logo {
      width: 34px; height: 34px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .hdr-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
    .hdr-dept { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .hdr-badge {
      background: var(--accent-dim);
      border: 1px solid var(--border-strong);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 4.5rem 2rem 4rem;
      text-align: center;
      background: linear-gradient(160deg, var(--bg) 0%, var(--surface-2) 60%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(38,107,176,0.07) 0%, transparent 70%);
      pointer-events: none; /* Ensure this doesn't block interactions */
    }
    .hero-eye {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-h1 {
      font-size: clamp(2.2rem, 5.5vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.035em; /* Keep tight kerning for headings */
      line-height: 1.05;
      margin-bottom: 18px;
    }
    .hero-h1 em { color: var(--accent); font-style: normal; }
    .hero-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 600px; /* Slightly wider for better readability */
      margin: 0 auto 28px;
      line-height: 1.7;
    }
    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 1px solid var(--border-strong);
      border-radius: 24px;
      padding: 8px 18px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }

    /* ── Tab nav ── */
    .tnav {
      position: sticky;
      top: var(--hdr);
      z-index: 90; /* Adjusted z-index to be below header but above content */
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .tnav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tnav-inner::-webkit-scrollbar { display: none; }
    .tbtn {
      padding: 14px 18px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .18s, border-color .18s;
    }
    .tbtn:hover { color: var(--text); }
    .tbtn.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; } /* Emphasize active tab */

    /* ── Content wrapper ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── Section header ── */
    .sec-eye { font-family: var(--mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .sec-h2 { font-size: 22px; font-weight: 800; letter-spacing: -.025em; color: var(--text); }
    .sec-sub { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
    .sec-hdr { margin-bottom: 24px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); /* Keep surface variable for card background */
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border-strong); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 16px; }

    .card-ico { font-size: 22px; margin-bottom: 12px; color: var(--text-primary); } /* Ensure icon color is visible */
    .card-ttl { font-size: 14px; font-weight: 700; margin-bottom: 7px; }
    .card-txt { font-size: 12.5px; color: var(--text-muted); line-height: 1.65; }

    /* ── Tags / pills ── */
    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      margin-top: 10px;
    }
    .pill-new  { background: rgba(92,200,160,0.1); color: var(--success); border: 1px solid rgba(92,200,160,0.28); }
    .pill-chg  { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border-strong); }
    .pill-gone { background: rgba(224,85,85,0.1); color: var(--danger); border: 1px solid rgba(224,85,85,0.25); }
    .pill-warn { background: rgba(245,183,49,0.1); color: var(--warning); border: 1px solid rgba(245,183,49,0.25); }
    .pill-sm   { margin-top: 0; font-size: 10px; }

    /* ── Alerts ── */
    .alert { padding: 12px 16px; border-radius: 9px; font-size: 12.5px; line-height: 1.6; display: flex; gap: 9px; }
    .alert strong { font-weight: 700; }
    .alert-info    { background: var(--accent-dim); border: 1px solid var(--border-strong); color: var(--accent); } /* Keep blue for info */
    .alert-warn    { background: rgba(245,183,49,0.07); border: 1px solid rgba(245,183,49,0.2); color: var(--warning); }
    .alert-danger  { background: rgba(224,85,85,0.07); border: 1px solid rgba(224,85,85,0.2); color: var(--danger); }
    .alert-success { background: rgba(92,200,160,0.07); border: 1px solid rgba(92,200,160,0.22); color: var(--success); }

    /* ── Divider ── */
    .div { height: 1px; background: var(--border); margin: 28px 0; }

    /* ── Tables ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface-2); padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); } /* Keep surface-2 for header background */
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(38,107,176,.03); }
    .tm { font-family: var(--mono); }
    .ta { font-family: var(--mono); color: var(--accent); font-weight: 600; }
    .tdim { color: var(--text-dim); text-decoration: line-through; font-family: var(--mono); }
    .tred { color: var(--danger); }
    .tgrn { color: var(--success); }
    .tmut { color: var(--text-muted); }

    /* ── Timeline ── */
    .tl { position: relative; padding-left: 22px; }
    .tl::before { content:''; position: absolute; left:6px; top:8px; bottom:8px; width:1px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 22px; color: var(--text); } /* Ensure text color is correct */
    .tl-item:last-child { margin-bottom: 0; }
    .tl-item::before { content:''; position: absolute; left:-19px; top:6px; width:9px; height:9px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
    .tl-date { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--accent); text-transform: uppercase; margin-bottom: 3px; }
    .tl-ttl { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
    .tl-txt { font-size: 12.5px; color: var(--text-muted); }

    /* ── Calculator ── */
    .calc-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media(max-width:768px){ .calc-layout { grid-template-columns: 1fr; } }

    .calc-panel {
      background: var(--surface); /* Keep surface variable */
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px;
    }
    .calc-result {
      background: var(--surface); /* Keep surface variable */
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 26px;
    }

    .flabel {
      display: block;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 9px;
    }
    .fgroup { margin-bottom: 20px; }

    .rbtn {
      padding: 8px 15px;
      background: var(--surface-2); /* Keep surface-2 for radio buttons */
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 12.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      font-weight: 500;
    }
    .rbtn:hover { border-color: var(--accent); color: var(--text); }
    .rbtn.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      height: 4px;
    }
    .range-lbl { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 5px; }

    /* ── Big SOR display ── */
    .sor-big {
      text-align: center;
      padding: 20px;
      background: var(--accent-dim);
      border: 1px solid var(--border-strong); /* Keep blue accent for this box */
      border-radius: 10px;
      margin-bottom: 18px;
    }
    .sor-big-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .sor-big-val { font-size: 3.2rem; font-weight: 800; letter-spacing: -.05em; color: var(--accent); line-height: 1; }
    .sor-big-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Bar ── */
    .bar-wrap { margin-bottom: 18px; }
    .bar-row { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-bottom: 6px; }
    .bar-track { height: 7px; background: var(--surface-3); border-radius: 4px; overflow: hidden; } /* Keep surface-3 for bar track */
    .bar-fill { height: 100%; border-radius: 4px; transition: width .35s ease; }

    /* ── Amount boxes ── */
    .amt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
    .amt-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 13px; }
    .amt-lbl { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 4px; }
    .amt-val { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); }
    .amt-prev { font-size: 10px; color: var(--text-dim); text-decoration: line-through; margin-top: 2px; font-family: var(--mono); } /* Keep text-dim for strikethrough */
    .amt-box.hi { background: var(--accent-dim); border-color: var(--border-strong); }
    .amt-box.hi .amt-val { color: var(--accent); font-size: 21px; }

    /* ── Breakdown ── */
    .bkdn { background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 15px; }
    .bkdn-ttl { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px; }
    .bkdn-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .bkdn-row:last-child { border-bottom: none; }
    .bkdn-k { color: var(--text-muted); }
    .bkdn-v { font-family: var(--mono); color: var(--text); font-weight: 500; }
    .bkdn-v.a { color: var(--accent); }

    /* ── Compare boxes ── */
    .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:600px){ .cmp-grid { grid-template-columns: 1fr; } }
    .cmp-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .cmp-box.red { border-color: rgba(224,85,85,.28); } /* Keep red border for comparison */
    .cmp-box.grn { border-color: rgba(92,200,160,.28); }
    .cmp-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; }
    .cmp-box.red .cmp-lbl { color: var(--danger); }
    .cmp-box.grn .cmp-lbl { color: var(--success); }

    /* ── FAQ ── */
    .faq-item { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 9px; overflow: hidden; transition: border-color .2s; }
    .faq-item.open { border-color: var(--border-strong); }
    .faq-q { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: var(--surface); font-size: 13.5px; font-weight: 600; user-select: none; transition: background .15s; color: var(--text); } /* Ensure text color is correct */
    .faq-q:hover { background: var(--surface-2); }
    .faq-chv { font-size: 18px; color: var(--accent); transition: transform .2s; flex-shrink:0; margin-left: 10px; line-height:1; }
    .faq-chv.open { transform: rotate(180deg); }
    .faq-a { padding: 15px 20px; font-size: 13px; color: var(--text-muted); line-height: 1.7; background: var(--surface-2); border-top: 1px solid var(--border); }

    /* ── Plan card ── */
    .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
    .plan-card.hi { border-color: var(--border-strong); } /* Keep blue accent for highlighted plan card */
    .plan-eye { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .plan-card.hi .plan-eye { color: var(--accent); }
    .plan-ttl { font-size: 18px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
    .plan-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.65; }
    .plan-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .plan-row:last-child { border-bottom: none; }
    .plan-k { color: var(--text-muted); }
    .plan-v { font-family: var(--mono); color: var(--text); }

    /* ── Footer ── */
    .footer { background: var(--surface); border-top: 1px solid var(--border); padding: 24px 2rem; text-align: center; font-size: 12px; color: var(--text-muted); }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Utils ── */
    .mb1 { margin-bottom: 6px; }
    .mb2 { margin-bottom: 12px; }
    .mb3 { margin-bottom: 18px; }
    .mb4 { margin-bottom: 24px; }
    .mb5 { margin-bottom: 32px; }
    .mt2 { margin-top: 12px; }
    .mt3 { margin-top: 18px; }
    .mt4 { margin-top: 24px; }
    .flex { display: flex; }
    .gap2 { gap: 8px; }
    .gap3 { gap: 12px; }
    .wrap { flex-wrap: wrap; }
    .acc { color: var(--accent); }
    .red { color: var(--danger); }
    .grn { color: var(--success); }
    .yel { color: var(--warning); }
    .mut { color: var(--text-muted); }
    .bold { font-weight: 700; }
    .mono { font-family: var(--mono); }
    .f12 { font-size: 12px; }
    .f13 { font-size: 13px; color: var(--text); } /* Ensure text color is correct */
    .center { text-align: center; }
    .full2 { grid-column: span 2; }

    @media(max-width:600px){
      .grid2 { grid-template-columns: 1fr; }
      .cmp-grid { grid-template-columns: 1fr; }
      .hero { padding: 3rem 1.5rem; }
      .page { padding: 2rem 1.25rem 3rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── Data constants ────────────────────────────────────────────────────────

    const UG_DEP = [
      { label: '0–31 Credits', sub: 3500, unsub: 2000 },
      { label: '32–63 Credits', sub: 4500, unsub: 2000 },
      { label: '64+ Credits',  sub: 5500, unsub: 2000 },
    ];
    const UG_IND = [
      { label: '0–31 Credits', sub: 3500, unsub: 6000 },
      { label: '32–63 Credits', sub: 4500, unsub: 6000 },
      { label: '64+ Credits',  sub: 5500, unsub: 7000 },
    ];
    const GRAD_LIMIT = { sub: 0, unsub: 20500 };

    // Full-time credits per full academic year (Fall + Spring)
    const FT = { ug: 24, grad: 18 };
    // Half-time minimum per term
    const HT = { ug: 6, grad: 5 };

    const FAQ = [
      { q: 'What is the Schedule of Reductions (SOR)?',
        a: 'SOR is a new rule that prorates your Federal Direct Loan based on credits enrolled. Full-time enrollment earns 100% of your annual loan limit. Every credit below full-time reduces your eligibility proportionally. SOR applies starting July 1, 2026 for loans on a 2026–27 ISIR or later.' },
      { q: 'How is the SOR percentage calculated?',
        a: 'SOR% = (Credits enrolled for the year) ÷ (Credits required for full-time in a year) × 100, rounded up to the nearest whole percent. For undergraduates at Stockton, full-time is 24 credits per year (12/semester). For graduate students it is 18 credits per year (9/semester). Example: 15 credits ÷ 24 = 62.5% → rounds up to 63%.' },
      { q: 'What is the minimum enrollment to receive a loan?',
        a: 'You must be enrolled at least half-time. For undergraduates that means at least 6 credits per term (Fall/Spring) or 6 credits in summer. For graduate students it is 5 credits in Fall/Spring or 3 credits in summer. Enrollment below half-time means zero loan eligibility.' },
      { q: 'What happened to the Graduate PLUS Loan?',
        a: 'The OBBBA eliminates the Grad PLUS Loan for new borrowers beginning July 1, 2026. However, if you were enrolled in your current degree program and received any Direct Loan before July 1, 2026, you may continue borrowing Grad PLUS under an Interim Exception for up to 3 additional academic years or until you complete your program — whichever comes first. Students who lose eligibility should explore Direct Unsubsidized Loans ($20,500/yr), private loans, scholarships, and payment plans.' },
      { q: 'How has the Parent PLUS Loan changed?',
        a: 'New borrowers (parents who have not previously borrowed a Parent PLUS Loan) face a federal annual cap of $20,000 per student and a lifetime cap of $65,000. Stockton limits new borrowers to $16,250 per year so parents who borrow for four years can reach the $65,000 lifetime limit without running out early. Parents who already borrowed before July 1, 2026 are covered by an Interim Exception for up to 3 more academic years.' },
      { q: 'What is the new Repayment Assistance Plan (RAP)?',
        a: 'RAP is an income-driven repayment plan replacing SAVE and other IDR plans. Your monthly payment equals a percentage of your AGI (1%–10%) divided by 12, minus $50 per dependent (floor of $10/month). If you make full, on-time payments, unpaid interest is subsidized so your balance will never grow. Forgiveness is available after 360 qualifying payments over at least 30 years. RAP payments count toward PSLF.' },
      { q: 'What is the new Tiered Standard Plan?',
        a: 'The Tiered Standard Plan sets fixed monthly payments based on your outstanding loan balance. Repayment periods range from 10 years (balance under $25,000) to 25 years (balance $100,000+). Important: payments under the Tiered Standard Plan do NOT count toward Public Service Loan Forgiveness (PSLF).' },
      { q: 'I am currently on an IDR plan. What happens to me?',
        a: 'If you have no new loans made on or after July 1, 2026, you may stay on your current plan or switch to RAP. You have until July 1, 2028 to make a selection — if you take no action, you will be automatically moved to RAP. If you later take out a new loan on or after July 1, 2026, your only options for all loans become RAP or the Tiered Standard Plan.' },
      { q: 'How have Pell Grant rules changed?',
        a: 'Two new restrictions apply starting July 1, 2026: (1) If your entire Cost of Attendance is already covered by non-federal grants and scholarships, you will not receive a Pell Grant even if you otherwise qualify. (2) If your Student Aid Index (SAI) exceeds $14,970 — which is twice the 2026–27 maximum Pell award of $7,395 — you are ineligible for Pell.' },
      { q: 'What are the new lifetime borrowing limits?',
        a: 'A single $257,500 lifetime cap now applies to all federal student loans except Parent PLUS Loans. Within that, graduate students face a $100,000 cap on graduate-only borrowing (previously $138,500 combined), and professional students face a $250,000 cap on professional-study borrowing. These new grad/professional caps do not count undergraduate loans.' },
      { q: 'If I drop credits after disbursement, does my loan get reduced?',
        a: 'Drops before disbursement require the loan to be recalculated and reduced. Drops after disbursement do not recapture already-disbursed funds, but the reduction is applied to a future term in the same academic year. If you drop below half-time in a term, your eligibility for that term ends. Always speak with Financial Aid before dropping credits.' },
      { q: 'Where can I get more help?',
        a: 'Visit the Stockton Office of Financial Aid at Campus Center Suite 201, call (609) 652-4203, or schedule an appointment at stockton.edu/contactfinaid. For federal guidance, visit studentaid.gov/announcements-events/big-updates.' },
    ];

    // ─── Helpers ──────────────────────────────────────────────────────────────

    const fmt = n => '$' + Math.round(n).toLocaleString();

    function getLimits(sType, dep, tier) {
      if (sType === 'grad') return { sub: 0, unsub: 20500 };
      const table = dep === 'dep' ? UG_DEP : UG_IND;
      return table[tier];
    }

    function sorPct(enrolled, ft) {
      if (enrolled <= 0) return 0;
      return Math.min(100, Math.ceil((enrolled / ft) * 100));
    }

    function rapMonthly(agi, deps) {
      let annual;
      if (agi <= 10000)       annual = 120;
      else if (agi <= 20000)  annual = agi * 0.01;
      else if (agi <= 30000)  annual = agi * 0.02;
      else if (agi <= 40000)  annual = agi * 0.03;
      else if (agi <= 50000)  annual = agi * 0.04;
      else if (agi <= 60000)  annual = agi * 0.05;
      else if (agi <= 70000)  annual = agi * 0.06;
      else if (agi <= 80000)  annual = agi * 0.07;
      else if (agi <= 90000)  annual = agi * 0.08;
      else if (agi <= 100000) annual = agi * 0.09;
      else                    annual = agi * 0.10;
      return Math.max(10, annual / 12 - deps * 50);
    }

    function rapRate(agi) {
      if (agi <= 10000) return '$120 flat/yr';
      if (agi <= 20000) return '1% of AGI';
      if (agi <= 30000) return '2% of AGI';
      if (agi <= 40000) return '3% of AGI';
      if (agi <= 50000) return '4% of AGI';
      if (agi <= 60000) return '5% of AGI';
      if (agi <= 70000) return '6% of AGI';
      if (agi <= 80000) return '7% of AGI';
      if (agi <= 90000) return '8% of AGI';
      if (agi <= 100000) return '9% of AGI';
      return '10% of AGI';
    }

          ))}

      );

    function Slider({ min, max, step = 1, value, onChange, leftLabel, midLabel, rightLabel }) {
      return (
        <>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(Number(e.target.value))} />
          <div className="range-lbl">
            <span>{leftLabel}</span>
            {midLabel && <span>{midLabel}</span>}
            <span>{rightLabel}</span>

    }

    // ─── SOR CALCULATOR TAB ───────────────────────────────────────────────────

    function SORTab() {
      const [sType,     setSType]     = useState('ug');
      const [dep,       setDep]       = useState('dep');
      const [tier,      setTier]      = useState(0);
      const [yearCr,    setYearCr]    = useState(18);

      const ft      = FT[sType];
      const ht      = HT[sType];
      const limits  = getLimits(sType, dep, tier);
      const total   = limits.sub + limits.unsub;
      const pct     = sorPct(yearCr, ft);
      const isHT    = yearCr >= ht;
      const isFT    = yearCr >= ft;
      const sorSub  = Math.round(limits.sub   * pct / 100);
      const sorUnsub= Math.round(limits.unsub * pct / 100);
      const sorTot  = sorSub + sorUnsub;

      const barColor = !isHT ? 'var(--danger)' : isFT ? 'var(--success)' : 'var(--accent)';
      const barPct   = Math.min(100, (yearCr / ft) * 100);

      return (
        <div>

            <div className="sec-eye">Interactive Tool</div>

            <div className="sec-sub">Estimate your Federal Direct Loan eligibility under the new Schedule of Reductions rule (effective July 1, 2026).</div>

          <div className="calc-layout">

            {/* ── Inputs ── */}
            <div className="calc-panel">
              <div className="fgroup">
                <label className="flabel">Student Type</label>
                <RadioGroup value={sType} onChange={v => { setSType(v); setYearCr(v === 'ug' ? 18 : 13); }}

              </div>

              {sType === 'ug' && (
                <div className="fgroup">
                  <label className="flabel">Dependency Status</label>
                  <RadioGroup value={dep} onChange={setDep}
                    options={[['dep','Dependent'],['ind','Independent']]} />

              )}

              {sType === 'ug' && (
                <div className="fgroup">
                  <label className="flabel">Credits Already Earned</label>

                </div>
              )}

              <div className="fgroup">
                <label className="flabel">
                  Total Credits Enrolled — Full Academic Year
                  &nbsp;<span style={{fontFamily:'var(--mono)',color:'var(--accent)',fontSize:14,fontWeight:600,textTransform:'none',letterSpacing:0}}>{yearCr} cr</span>
                </label>
                <Slider
                  min={0} max={sType === 'ug' ? 36 : 27} value={yearCr}
                  onChange={setYearCr}
                  leftLabel="0"
                  midLabel={`Half-time ≥${ht}`}
                  rightLabel={`${sType==='ug'?36:27} max`}

              </div>

              <div className="div" style={{margin:'18px 0'}} />

              <div style={{fontSize:12, color:'var(--text-muted)', lineHeight:1.75}}>
                <div><span className="acc bold">Full-time</span> = {ft} credits/year — earns 100% annual loan limit</div>

              </div>
            </div>

            {/* ── Results ── */}
            <div className="calc-result">
              {yearCr === 0 && (
                <div className="alert alert-info mb3">👆 Adjust the credits slider to see your estimated eligibility.</div>
              )}
              {yearCr > 0 && !isHT && (
                <div className="alert alert-danger mb3">⛔ <strong>Below half-time.</strong> No Federal Direct Loan eligibility.</div>
              )}
              {isHT && isFT && (
                <div className="alert alert-success mb3">✅ <strong>Full-time enrollment.</strong> You receive 100% of your annual limit.</div>
              )}
              {isHT && !isFT && yearCr > 0 && (

                  <div className="bar-fill" style={{ width: barPct + '%', background: barColor }} />

                    <div className="bkdn-row"><span className="bkdn-k">Prorated total</span><span className="bkdn-v a">{fmt(sorTot)}</span></div>
                  </div>
                </>
              )}
            </div>
          </div>

          <div className="div" />
          <div className="alert alert-info">
            💡 <strong>Important:</strong> Dropping credits <em>before</em> disbursement requires a loan recalculation. Dropping after disbursement shifts the reduction to a future term. Always contact Financial Aid before making enrollment changes.
          </div>
        </div>
      );
    }
