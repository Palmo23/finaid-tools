<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Federal Direct Loan Proration Calculator — Stockton University</title>
  <link rel="stylesheet" href="../css/stockton-theme.css" />
  <style>
    input[type="range"] { accent-color: var(--stockton-blue); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <header>
    <div class="container header-inner">
      <div class="header-brand">
        <div class="stockton-logo">
          <img src="../images/stockton-logo.png" alt="Stockton University">
        </div>
        <div class="header-title">
          <h1>Financial Aid Toolkit</h1>
          <p>Stockton University Office of Financial Aid</p>
        </div>
      </div>
      <div class="header-nav">
        <a href="../index.html">← Back to Toolkit</a>
      </div>
    </div>
  </header>
  
  <main id="main-content" class="container">
    <div id="root"></div>
  </main>

  <div class="brand-bar">
    Stockton University • Financial Aid Office • <a href="https://stockton.edu/financial-aid/">Official Website</a>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const ANNUAL_CREDITS = 24;

    const LOAN_LIMITS = {
      dependent:   { subsidized: 5500, unsubsidized: 2000,  total: 7500  },
      independent: { subsidized: 5500, unsubsidized: 7000,  total: 12500 },
    };

    const fmt = (n) =>
      new Intl.NumberFormat("en-US", {
        style: "currency", currency: "USD", maximumFractionDigits: 0,
      }).format(Math.round(n));

    const STEPS = ["Eligibility", "Dependency", "Credits", "Results"];

    const S = {
      root: {
        fontFamily: "var(--font-sans)",
        maxWidth: 680,
        margin: "2rem auto 4rem",
        padding: 0,
        background: "transparent",
        color: "var(--text-primary)",
      },
      header: {
        display: "none"
      },
      wordmark: {
        display: "none"
      },
      title: {
        display: "none"
      },
      subtitle: {
        display: "none"
      },
      progress: {
        display: "flex",
        alignItems: "center",
        gap: 0,
        marginBottom: "2rem",
        fontFamily: "var(--font-sans)",
      },
      stepDot: (active, done) => ({
        width: 28,
        height: 28,
        borderRadius: "50%",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontSize: 12,
        fontWeight: 600,
        background: done ? "var(--stockton-blue-light)" : active ? "var(--stockton-blue)" : "var(--bg-color)",
        border: done ? "2px solid var(--stockton-blue)" : active ? "2px solid var(--stockton-blue)" : "2px solid var(--border-color)",
        color: done ? "var(--stockton-blue)" : active ? "#fff" : "var(--text-muted)",
        flexShrink: 0,
        transition: "all 0.3s",
      }),
      stepLabel: (active, done) => ({
        fontSize: 11,
        letterSpacing: "0.05em",
        textTransform: "uppercase",
        color: done || active ? "var(--stockton-blue-dark)" : "var(--text-muted)",
        fontWeight: active || done ? 700 : 400,
        fontFamily: "var(--font-sans)",
      }),
      stepLine: (done) => ({
        flex: 1,
        height: 2,
        background: done ? "var(--stockton-blue)" : "var(--border-color)",
        transition: "background 0.3s",
        margin: "0 6px",
      }),
      card: {
        background: "var(--card-bg)",
        border: "1px solid var(--border-color)",
        borderRadius: "var(--radius-card)",
        padding: "2rem 1.5rem",
        marginBottom: "1.25rem",
        boxShadow: "var(--shadow-sm)",
      },
      questionText: {
        fontSize: 18,
        fontWeight: 600,
        color: "var(--stockton-blue-dark)",
        marginBottom: 8,
        lineHeight: 1.35,
      },
      educationBox: {
        background: "var(--stockton-blue-light)",
        border: "1px solid var(--border-color)",
        borderLeft: "4px solid var(--stockton-blue)",
        borderRadius: "var(--radius-card)",
        padding: "1rem 1.25rem",
        fontSize: 14,
        color: "var(--stockton-blue-dark)",
        marginBottom: "1.25rem",
        fontFamily: "var(--font-sans)",
        lineHeight: 1.65,
      },
      warningBox: {
        background: "var(--color-warning-bg)",
        border: "1px solid var(--border-color)",
        borderLeft: "4px solid var(--color-warning)",
        borderRadius: "var(--radius-card)",
        padding: "1rem 1.25rem",
        fontSize: 14,
        color: "var(--color-warning)",
        marginBottom: "1.25rem",
        fontFamily: "var(--font-sans)",
        lineHeight: 1.65,
      },
      optionGrid: {
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: 12,
        marginTop: "1rem",
      },
      optionBtn: (selected) => ({
        border: selected ? "2px solid var(--stockton-blue)" : "1.5px solid var(--border-color)",
        borderRadius: "var(--radius-btn)",
        padding: "1.25rem",
        background: selected ? "var(--stockton-blue-light)" : "var(--card-bg)",
        cursor: "pointer",
        textAlign: "left",
        fontFamily: "var(--font-sans)",
        transition: "all 0.15s",
        width: "100%",
      }),
      optionTitle: (selected) => ({
        fontSize: 15,
        fontWeight: 600,
        color: selected ? "var(--stockton-blue-dark)" : "var(--text-primary)",
        marginBottom: 4,
        display: "block",
      }),
      optionDesc: {
        fontSize: 12,
        color: "var(--text-muted)",
        lineHeight: 1.5,
        display: "block",
      },
      sliderWrap: { marginTop: "1.25rem" },
      sliderLabel: {
        display: "flex",
        justifyContent: "space-between",
        fontFamily: "var(--font-sans)",
        marginBottom: 8,
      },
      sliderLabelText: { fontSize: 13, color: "var(--text-muted)", alignSelf: "center" },
      sliderValue: { fontSize: 24, fontWeight: 700, color: "var(--stockton-blue)" },
      slider: { width: "100%", cursor: "pointer", accentColor: "var(--stockton-blue)" },
      sliderTicks: {
        display: "flex",
        justifyContent: "space-between",
        fontFamily: "var(--font-sans)",
        fontSize: 11,
        color: "var(--text-muted)",
        marginTop: 4,
        paddingLeft: 2,
        paddingRight: 2,
      },
      btnRow: { display: "flex", gap: 10, marginTop: "1.5rem" },
      btnPrimary: {
        background: "var(--stockton-blue)",
        color: "#fff",
        border: "none",
        borderRadius: "var(--radius-btn)",
        padding: "0.75rem 1.5rem",
        fontSize: 14,
        fontFamily: "var(--font-sans)",
        fontWeight: 600,
        cursor: "pointer",
        letterSpacing: "0.02em",
        transition: "transform 0.1s ease, background-color var(--transition-fast)",
      },
      btnSecondary: {
        background: "transparent",
        color: "var(--stockton-blue)",
        border: "1.5px solid var(--stockton-blue)",
        borderRadius: "var(--radius-btn)",
        padding: "0.75rem 1.25rem",
        fontSize: 14,
        fontFamily: "var(--font-sans)",
        fontWeight: 600,
        cursor: "pointer",
        transition: "background-color var(--transition-fast)",
      },
      resultCard: {
        background: "var(--card-bg)",
        border: "1px solid var(--border-color)",
        borderRadius: "var(--radius-card)",
        overflow: "hidden",
        marginBottom: "1.25rem",
        boxShadow: "var(--shadow-sm)",
      },
      resultHeader: {
        background: "var(--stockton-blue)",
        color: "#fff",
        padding: "1.25rem 1.5rem",
        fontFamily: "var(--font-sans)",
      },
      resultHeaderTitle: {
        fontSize: 11,
        letterSpacing: "0.1em",
        textTransform: "uppercase",
        opacity: 0.85,
        margin: 0,
        fontWeight: 600,
      },
      resultHeaderAmt: {
        fontSize: 32,
        fontWeight: 700,
        margin: "4px 0 0",
        fontFamily: "var(--font-sans)",
      },
      resultBody: { padding: "1.5rem" },
      formulaWrap: {
        background: "var(--bg-color)",
        border: "1px solid var(--border-color)",
        borderRadius: "var(--radius-btn)",
        padding: "1.25rem",
        fontFamily: "var(--font-sans)",
        marginBottom: "1.5rem",
      },
      formulaTitle: {
        fontSize: 11,
        letterSpacing: "0.1em",
        textTransform: "uppercase",
        color: "var(--text-muted)",
        marginBottom: 10,
        fontWeight: 600,
      },
      formulaRow: {
        display: "flex",
        alignItems: "center",
        gap: 10,
        fontSize: 16,
        flexWrap: "wrap",
      },
      formulaFraction: {
        display: "inline-flex",
        flexDirection: "column",
        alignItems: "center",
        gap: 2,
      },
      formulaNum: {
        fontSize: 16,
        fontWeight: 700,
        color: "var(--stockton-blue)",
        borderBottom: "2px solid var(--stockton-blue)",
        paddingBottom: 2,
        lineHeight: 1,
      },
      formulaDen: { fontSize: 13, color: "var(--text-primary)", lineHeight: 1, paddingTop: 2 },
      formulaOp:  { color: "var(--text-muted)", fontSize: 18 },
      formulaAnnual: { fontSize: 15, fontWeight: 600, color: "var(--stockton-blue)" },
      loanBreakdown: {
        display: "grid",
        gridTemplateColumns: "1fr 1fr 1fr",
        gap: 12,
        marginBottom: "1.25rem",
      },
      loanType: (c) => ({
        background: c === "sub" ? "var(--color-success-bg)" : c === "unsub" ? "var(--color-warning-bg)" : "var(--stockton-blue-light)",
        borderRadius: "var(--radius-btn)",
        padding: "0.85rem",
        fontFamily: "var(--font-sans)",
        textAlign: "center",
        border: `1px solid ${c === 'sub' ? 'rgba(18,122,58,0.15)' : c === 'unsub' ? 'rgba(138,90,0,0.15)' : 'var(--border-color)'}`,
      }),
      loanTypeLabel: {
        fontSize: 10,
        letterSpacing: "0.08em",
        textTransform: "uppercase",
        color: "var(--text-muted)",
        display: "block",
        marginBottom: 4,
        fontWeight: 600,
      },
      loanTypeAmt: (c) => ({
        fontSize: 18,
        fontWeight: 700,
        color: c === "sub" ? "var(--color-success)" : c === "unsub" ? "var(--color-warning)" : "var(--stockton-blue-dark)",
        display: "block",
      }),
      callout: {
        background: "var(--bg-color)",
        borderRadius: "var(--radius-btn)",
        padding: "1rem 1.25rem",
        fontSize: 13,
        color: "var(--text-primary)",
        fontFamily: "var(--font-sans)",
        lineHeight: 1.65,
        borderLeft: "4px solid var(--stockton-blue)",
      },
      resetBtn: {
        background: "transparent",
        border: "none",
        color: "var(--stockton-blue)",
        fontSize: 13,
        fontFamily: "var(--font-sans)",
        fontWeight: 600,
        cursor: "pointer",
        textDecoration: "underline",
        padding: 0,
        marginTop: "0.75rem",
        display: "block",
      },
      notEligibleCard: {
        background: "var(--card-bg)",
        border: "1px solid var(--border-color)",
        borderRadius: "var(--radius-card)",
        padding: "2.5rem 1.5rem",
        fontFamily: "var(--font-sans)",
        textAlign: "center",
        boxShadow: "var(--shadow-sm)",
      },
      badge: {
        display: "inline-block",
        background: "var(--color-warning-bg)",
        color: "var(--color-warning)",
        fontSize: 12,
        fontWeight: 600,
        letterSpacing: "0.05em",
        padding: "4px 12px",
        borderRadius: 20,
        marginBottom: 12,
        fontFamily: "var(--font-sans)",
        border: "1px solid rgba(138,90,0,0.15)",
      },
    };

    function App() {
      const [step,       setStep]       = useState(0);
      const [isEligible, setIsEligible] = useState(null);
      const [dependency, setDependency] = useState(null);
      const [credits,    setCredits]    = useState(12);

      const limits        = dependency ? LOAN_LIMITS[dependency] : null;
      const prorationFactor = Math.min(credits / ANNUAL_CREDITS, 0.5);
      const proratedTotal = limits ? Math.round(prorationFactor * limits.total) : 0;
      const proratedSub   = limits ? Math.round(prorationFactor * limits.subsidized) : 0;
      const proratedUnsub = limits ? Math.round(prorationFactor * limits.unsubsidized) : 0;

      const reset = () => { setStep(0); setIsEligible(null); setDependency(null); setCredits(12); };

      const currentStepIndex = step === 0.5 ? 0 : Math.floor(step);

      const ProgressBar = () => (
        <div style={S.progress}>
          {STEPS.map((label, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", flex: i < STEPS.length - 1 ? "1" : "0" }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                <div style={S.stepDot(currentStepIndex === i, currentStepIndex > i)}>
                  {currentStepIndex > i ? "✓" : i + 1}
                </div>
                <span style={S.stepLabel(currentStepIndex === i, currentStepIndex > i)}>{label}</span>
              </div>
              {i < STEPS.length - 1 && (
                <div style={{ ...S.stepLine(currentStepIndex > i), marginBottom: 18 }} />
              )}
            </div>
          ))}
        </div>
      );

      return (
        <div style={S.root}>



          <ProgressBar />

          {/* ── Step 0: Eligibility ── */}
          {step === 0 && (
            <div>
              <div style={S.educationBox}>
                <strong>What is loan proration?</strong> Federal Direct Loans are calculated assuming
                a full academic year (24 credits). When a graduating undergraduate student completes
                their degree in a single semester, federal regulations require the institution to{" "}
                <em>prorate</em> — proportionally adjust — the loan amount based on actual credits enrolled.
              </div>
              <div style={S.card}>
                <p style={S.questionText}>
                  Are you a graduating undergraduate student completing your degree this semester?
                </p>
                <p style={{ fontSize: 13, color: "#666", fontFamily: "sans-serif", marginBottom: "1rem", marginTop: 4 }}>
                  Proration only applies to undergraduates in their final semester.
                  Graduate and professional students are not affected.
                </p>
                <div style={S.optionGrid}>
                  <button style={S.optionBtn(isEligible === true)} onClick={() => setIsEligible(true)}>
                    <span style={S.optionTitle(isEligible === true)}>Yes</span>
                    <span style={S.optionDesc}>I'm an undergrad completing my degree this semester (typically December graduates).</span>
                  </button>
                  <button style={S.optionBtn(isEligible === false)} onClick={() => setIsEligible(false)}>
                    <span style={S.optionTitle(isEligible === false)}>No</span>
                    <span style={S.optionDesc}>I'm not graduating this semester, or I'm a graduate / professional student.</span>
                  </button>
                </div>
                <div style={S.btnRow}>
                  <button
                    style={{ ...S.btnPrimary, opacity: isEligible === null ? 0.4 : 1 }}
                    disabled={isEligible === null}
                    onClick={() => setStep(isEligible ? 1 : 0.5)}
                  >
                    Continue →
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── Not eligible ── */}
          {step === 0.5 && (
            <div style={S.notEligibleCard}>
              <div style={S.badge}>Not Subject to Proration</div>
              <p style={{ fontSize: 16, color: "#333", marginBottom: 8 }}>
                Loan proration does not apply to you.
              </p>
              <p style={{ fontSize: 13, color: "#666", maxWidth: 440, margin: "0 auto 1.25rem", lineHeight: 1.65 }}>
                Only undergraduate students completing their final semester of enrollment have their
                loans prorated. Graduate students and students continuing beyond this semester receive
                their full annual loan amounts.
              </p>
              <p style={{ fontSize: 13, color: "#444", lineHeight: 1.65 }}>
                Questions? Contact the Stockton Financial Aid Office at{" "}
                <strong>(609) 652-4203</strong> or email <strong>finaid@stockton.edu</strong>.
              </p>
              <button style={S.resetBtn} onClick={reset}>← Start over</button>
            </div>
          )}

          {/* ── Step 1: Dependency ── */}
          {step === 1 && (
            <div>
              <div style={S.educationBox}>
                <strong>Why does dependency status matter?</strong> The federal government sets
                different annual loan limits depending on whether you are classified as a{" "}
                <em>dependent</em> or <em>independent</em> student. Independent students (and
                dependents with a Parent PLUS Loan denial) have access to higher unsubsidized
                loan amounts.
              </div>
              <div style={S.card}>
                <p style={S.questionText}>
                  What is your dependency status for federal financial aid purposes?
                </p>
                <p style={{ fontSize: 13, color: "#666", fontFamily: "sans-serif", marginBottom: "1rem", marginTop: 4 }}>
                  This is determined by your FAFSA. It is not simply whether you live with your parents.
                </p>
                <div style={S.optionGrid}>
                  <button style={S.optionBtn(dependency === "dependent")} onClick={() => setDependency("dependent")}>
                    <span style={S.optionTitle(dependency === "dependent")}>Dependent</span>
                    <span style={S.optionDesc}>FAFSA includes parent information. Annual limit: $7,500 (Sub $5,500 + Unsub $2,000).</span>
                  </button>
                  <button style={S.optionBtn(dependency === "independent")} onClick={() => setDependency("independent")}>
                    <span style={S.optionTitle(dependency === "independent")}>Independent</span>
                    <span style={S.optionDesc}>Or dependent with a Parent PLUS denial. Annual limit: $12,500 (Sub $5,500 + Unsub $7,000).</span>
                  </button>
                </div>
                <div style={S.btnRow}>
                  <button style={S.btnSecondary} onClick={() => setStep(0)}>← Back</button>
                  <button
                    style={{ ...S.btnPrimary, opacity: !dependency ? 0.4 : 1 }}
                    disabled={!dependency}
                    onClick={() => setStep(2)}
                  >
                    Continue →
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 2: Credits ── */}
          {step === 2 && (
            <div>
              <div style={S.educationBox}>
                <strong>How credits affect your loan.</strong> The proration formula divides your
                enrolled credits by <strong>24</strong> (the standard full academic year credit load)
                and multiplies by your annual loan limit. More credits = a proportionally higher
                prorated amount.
              </div>
              <div style={S.card}>
                <p style={S.questionText}>How many credits are you enrolled in this semester?</p>
                <div style={S.sliderWrap}>
                  <div style={S.sliderLabel}>
                    <span style={S.sliderLabelText}>Credits enrolled</span>
                    <span style={S.sliderValue}>{credits} credits</span>
                  </div>
                  <input
                    type="range" min={1} max={24} step={1} value={credits}
                    onChange={(e) => setCredits(Number(e.target.value))}
                    style={S.slider}
                  />
                  <div style={S.sliderTicks}>
                    <span>1</span><span>6</span><span>12</span><span>18</span><span>24</span>
                  </div>
                </div>

                {dependency && (
                  <div style={{ marginTop: "1.5rem", padding: "1rem", background: "#f7f5f0", borderRadius: 6 }}>
                    <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>
                      Live estimate
                    </div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                      <span style={{ fontFamily: "Georgia, serif", fontSize: 32, color: "#1b4332", fontWeight: "normal" }}>
                        {fmt(Math.round(Math.min(credits / ANNUAL_CREDITS,0.5) * LOAN_LIMITS[dependency].total))}
                      </span>
                      <span style={{ fontFamily: "sans-serif", fontSize: 13, color: "#888" }}>prorated total</span>
                    </div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 13, color: "#555", marginTop: 4 }}>
                      {credits} ÷ 24 = {Math.min(credits / ANNUAL_CREDITS,0.5).toFixed(3)}{credits / ANNUAL_CREDITS > 0.5 && " (capped at 50%)"} × {fmt(LOAN_LIMITS[dependency].total)} annual limit
                    </div>
                  </div>
                )}

                <div style={S.btnRow}>
                  <button style={S.btnSecondary} onClick={() => setStep(1)}>← Back</button>
                  <button style={S.btnPrimary} onClick={() => setStep(3)}>Calculate →</button>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 3: Results ── */}
          {step === 3 && limits && (
            <div>
              <div style={S.resultCard}>
                <div style={S.resultHeader}>
                  <p style={S.resultHeaderTitle}>Estimated prorated loan eligibility</p>
                  <p style={S.resultHeaderAmt}>{fmt(proratedTotal)}</p>
                  <p style={{ fontFamily: "sans-serif", fontSize: 13, opacity: 0.75, margin: "4px 0 0" }}>
                    {credits} credits enrolled · {dependency === "dependent" ? "Dependent" : "Independent"} student
                  </p>
                </div>

                <div style={S.resultBody}>
                  {/* Formula */}
                  <div style={S.formulaWrap}>
                    <div style={S.formulaTitle}>How this was calculated</div>
                    <div style={S.formulaRow}>
                      <div style={S.formulaFraction}>
                        <span style={S.formulaNum}>{credits} credits enrolled</span>
                        <span style={S.formulaDen}>24 credits (full academic year)</span>
                      </div>
                      <span style={S.formulaOp}>×</span>
                      <span style={S.formulaAnnual}>{fmt(limits.total)} annual limit</span>
                      <span style={S.formulaOp}>=</span>
                      <span style={{ ...S.formulaAnnual, fontSize: 18 }}>{fmt(proratedTotal)}</span>
                    </div>
                  </div>

                  {/* Breakdown */}
                  <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>
                    Loan breakdown
                  </div>
                  <div style={S.loanBreakdown}>
                    <div style={S.loanType("sub")}>
                      <span style={S.loanTypeLabel}>Subsidized</span>
                      <span style={S.loanTypeAmt("sub")}>{fmt(proratedSub)}</span>
                    </div>
                    <div style={S.loanType("unsub")}>
                      <span style={S.loanTypeLabel}>Unsubsidized</span>
                      <span style={S.loanTypeAmt("unsub")}>{fmt(proratedUnsub)}</span>
                    </div>
                    <div style={S.loanType("tot")}>
                      <span style={S.loanTypeLabel}>Total</span>
                      <span style={S.loanTypeAmt("tot")}>{fmt(proratedTotal)}</span>
                    </div>
                  </div>

                  {/* Callouts */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <div style={S.educationBox}>
                      <strong>What happens next?</strong> If the prorated amount is <em>less</em> than
                      what has already disbursed, a downward adjustment will be made automatically —
                      which may result in a bill from the Bursar's Office. Check your account on the{" "}
                      <strong>goStockton portal</strong> regularly.
                    </div>
                    {proratedTotal > limits.total * 0.5 && (
                      <div style={S.educationBox}>
                        <strong>You may be eligible for more.</strong> If proration results in an{" "}
                        <em>increase</em> in your loan eligibility, Stockton's Financial Aid office
                        will email you. You can also proactively reach out at{" "}
                        <strong>finaid@stockton.edu</strong>.
                      </div>
                    )}
                    <div style={S.warningBox}>
                      <strong>Important:</strong> This estimate doesn't account for your cumulative
                      borrowing history or federal aggregate loan limits. Your actual award may differ.
                      Visit <strong>studentaid.gov</strong> to review your lifetime borrowing history.
                    </div>
                    <div style={S.callout}>
                      <strong>Annual loan limits used for this calculation:</strong><br />
                      {dependency === "dependent"
                        ? "Dependent senior: Subsidized $5,500 + Unsubsidized $2,000 = $7,500 total annual limit."
                        : "Independent senior: Subsidized $5,500 + Unsubsidized $7,000 = $12,500 total annual limit."}
                      <br /><br />
                      Questions? Contact Stockton Financial Aid at <strong>(609) 652-4203</strong> or
                      email <strong>finaid@stockton.edu</strong>.
                    </div>
                  </div>
                </div>
              </div>

              <button style={S.resetBtn} onClick={reset}>← Start a new calculation</button>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
